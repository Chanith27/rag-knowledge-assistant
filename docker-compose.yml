services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma

  rag-app:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env  # This loads the host's .env file at RUNTIME, not build time
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - chromadb
    volumes:
      - ./docs:/usr/src/app/docs
    restart: always

networks:
  default:
    name: rag-network
